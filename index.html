<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="flipbook-container">
        <!-- *****Left Arrow******* -->
        <button id="prev-arrow" class="arrow arrow-left" title="Previous page"><img src="img/Left.png" alt=""></button>

        <!-- ****Flipbook****** -->
        <div id="flipbook">
            <div class="page cover"><img src="img/Cover Page.png" alt="cover image"></div>
            <div class="page"><img src="img/Table of Contents.png" alt="table of content"></div>
            <div class="page"><img src="img/Product Overview.png" alt="Product Overview"></div>
            <div class="page"><img src="img/Use Cases.png" alt="Use case"></div>
            <div class="page"><img src="img/Key Features.png" alt="Key Features"></div>
            <div class="page"><img src="img/Technical Highlights.png" alt="Technical Highlights"></div>
            <div class="page"><img src="img/DEPLOYMENT & MANAGEMENT.png" alt="DEPLOYMENT & MANAGEMENT"></div>
            <div class="page"><img src="IMG/Back cover page.png" alt="back cover"></div>
        </div>

        <!-- ******Right Arrow***** -->
        <button id="next-arrow" class="arrow arrow-right" title="Next page"><img src="img/Right.png" alt=""></button>
    </div>

    <!-- ******Bottom Control Bar****** -->
    <div class="bottom-bar">
        <div class="page-indicator">
            <span class="page-text"><span id="current-page">1</span> / <span id="total-pages">6</span></span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="zoom-controls">
            <button id="zoom-out" title="Zoom out">−</button>
            <input type="range" id="zoom-slider" min="50" max="200" value="100" title="Zoom">
            <button id="zoom-in" title="Zoom in">+</button>
        </div>

        <button id="fullscreen-btn" title="Toggle fullscreen">⛶</button>
    </div>

    <script src="js/main.js"></script>
</body>


</html>
